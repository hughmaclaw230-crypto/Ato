# Render 部署設定檔 — AutoTHSR (ATO) v3.0
# Telegram 指令控制 + 高鐵時刻表查詢 + 6 小時保活

services:
  - type: web               # Web Service（接收 Webhook）
    name: ato
    runtime: docker
    dockerfilePath: ./Dockerfile

    # ── 環境變數 ──
    envVars:
      # ── Telegram Bot ──
      - key: TELEGRAM_BOT_TOKEN
        sync: false           # 在 Dashboard 手動填入
      - key: ADMIN_TELEGRAM_CHAT_ID
        sync: false           # 管理員 Chat ID
      - key: SUPERADMIN_CHAT_ID
        sync: false           # 最高權限擁有者 Chat ID

      # ── Firebase / Firestore ──
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false           # Firebase Service Account JSON（完整 JSON 字串）

      # ── Render 設定 ──
      - key: RENDER_EXTERNAL_URL
        sync: false           # e.g. https://ato.onrender.com

      # ── 訂票預設值（可透過 Bot 指令修改） ──
      - key: THSRC_ID
        sync: false           # 身分證字號
      - key: THSRC_PHONE
        sync: false           # 手機號碼
      - key: FROM_STATION
        value: 南港
      - key: TO_STATION
        value: 左營
      - key: TRAVEL_DATE
        sync: false           # 格式: 2026/06/01
      - key: TRAVEL_TIME
        sync: false           # 格式: 07:30
      - key: ADULT_COUNT
        value: "1"
      - key: SEAT_TYPE
        value: 無座位偏好
      - key: MAX_RETRIES
        value: "30"
      - key: RETRY_INTERVAL
        value: "3"
      - key: MODEL_PATH
        value: model/thsrc_cnn_model.hdf5
